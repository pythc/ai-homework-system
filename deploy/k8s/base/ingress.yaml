apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-homework-api
  labels:
    app.kubernetes.io/name: ai-homework-api
    app.kubernetes.io/part-of: ai-homework
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "80"
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - homework.example.com
      secretName: homework-tls
  rules:
    - host: homework.example.com
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: server-auth
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server-api
                port:
                  number: 80
          - path: /assistant
            pathType: Prefix
            backend:
              service:
                name: assistant-service
                port:
                  number: 4100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-homework-web
  labels:
    app.kubernetes.io/name: ai-homework-web
    app.kubernetes.io/part-of: ai-homework
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "120"
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - homework.example.com
      secretName: homework-tls
  rules:
    - host: homework.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
