apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-service
  labels:
    app.kubernetes.io/name: assistant-service
    app.kubernetes.io/part-of: ai-homework
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: assistant-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: assistant-service
        app.kubernetes.io/part-of: ai-homework
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: assistant-service
          image: ghcr.io/pythc/ai-homework-system-assistant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4100
              name: http
          envFrom:
            - configMapRef:
                name: ai-homework-config
            - secretRef:
                name: ai-homework-secret
          env:
            - name: ASSISTANT_PORT
              value: "4100"
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: assistant-service
  labels:
    app.kubernetes.io/name: assistant-service
    app.kubernetes.io/part-of: ai-homework
spec:
  selector:
    app.kubernetes.io/name: assistant-service
  ports:
    - name: http
      port: 4100
      targetPort: http
