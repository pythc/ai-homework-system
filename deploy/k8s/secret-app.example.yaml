apiVersion: v1
kind: Secret
metadata:
  name: ai-homework-secret
  namespace: ai-homework
  labels:
    app.kubernetes.io/name: ai-homework-system
    app.kubernetes.io/part-of: ai-homework

type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "change_me"
  POSTGRES_DB: "postgres"

  JWT_ACCESS_SECRET: "change_me_access"
  JWT_REFRESH_SECRET: "change_me_refresh"

  # Ark model key for grading + assistant
  ARK_API_KEY: "change_me"

  # Object storage credentials
  S3_ACCESS_KEY_ID: "change_me"
  S3_SECRET_ACCESS_KEY: "change_me"

  # Assistant model settings
  ASSISTANT_MODEL: "doubao-seed-2-0-mini-260215"
  ASSISTANT_BASE_URL: "https://ark.cn-beijing.volces.com/api/v3"
