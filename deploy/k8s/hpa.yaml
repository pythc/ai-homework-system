apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-api
  labels:
    app.kubernetes.io/name: server-api
    app.kubernetes.io/part-of: ai-homework
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: server-api
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 30
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
