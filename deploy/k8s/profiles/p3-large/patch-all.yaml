apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-homework-config
data:
  AUTH_LOGIN_MAX_INFLIGHT: "60"
  PG_POOL_MAX: "120"
  PG_POOL_MIN: "20"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: pgbouncer
          env:
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "8000"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "350"
            - name: PGBOUNCER_MIN_POOL_SIZE
              value: "100"
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: "80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-api
spec:
  replicas: 10
  template:
    spec:
      containers:
        - name: server-api
          resources:
            requests:
              cpu: 700m
              memory: 1536Mi
            limits:
              cpu: 3
              memory: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-auth
spec:
  replicas: 5
  template:
    spec:
      containers:
        - name: server-auth
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-worker
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: server-worker
          resources:
            requests:
              cpu: 1
              memory: 1536Mi
            limits:
              cpu: 3
              memory: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-service
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: assistant-service
          resources:
            requests:
              cpu: 600m
              memory: 1Gi
            limits:
              cpu: 2500m
              memory: 4Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 1500m
              memory: 2Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-api
spec:
  minReplicas: 10
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-auth
spec:
  minReplicas: 5
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-worker
spec:
  minReplicas: 4
  maxReplicas: 24
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assistant-service
spec:
  minReplicas: 4
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
spec:
  minReplicas: 4
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-homework-api
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "150"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "350"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-homework-web
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "300"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "600"
