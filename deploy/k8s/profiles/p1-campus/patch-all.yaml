apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-homework-config
data:
  AUTH_LOGIN_MAX_INFLIGHT: "20"
  PG_POOL_MAX: "40"
  PG_POOL_MIN: "8"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: pgbouncer
          env:
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "1200"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "80"
            - name: PGBOUNCER_MIN_POOL_SIZE
              value: "20"
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: "20"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-api
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: server-api
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-auth
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: server-auth
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: server-worker
          resources:
            requests:
              cpu: 400m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant-service
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: assistant-service
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-api
spec:
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-auth
spec:
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 55
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: server-worker
spec:
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: assistant-service
spec:
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
spec:
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-homework-api
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "40"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "4"
    nginx.ingress.kubernetes.io/limit-connections: "100"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-homework-web
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "80"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "4"
    nginx.ingress.kubernetes.io/limit-connections: "150"
