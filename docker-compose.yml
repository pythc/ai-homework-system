services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-ai-homework-files}
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb -p local/$$S3_BUCKET || true
        mc anonymous set none local/$$S3_BUCKET || true

  server_api:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SERVER_APP_PROFILE: api
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      DISABLE_AI_WORKER: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      AI_GRADING_PREFIX_CACHE_REDIS_URL: redis://redis:6379
      ASSISTANT_BASE_URL: http://assistant_service:4100
      AI_GRADING_PYTHON: python3
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      LOCAL_STORAGE_ROOT: uploads
      LOCAL_STORAGE_PUBLIC_BASE: /uploads
      STORAGE_SIGNED_URL_TTL_SECONDS: ${STORAGE_SIGNED_URL_TTL_SECONDS:-900}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-/s3}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-ai-homework-files}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  server_auth:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SERVER_APP_PROFILE: auth
      RUN_MIGRATIONS: "false"
      DISABLE_AI_WORKER: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      AI_GRADING_PREFIX_CACHE_REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  server_worker:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SERVER_APP_PROFILE: worker
      RUN_MIGRATIONS: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      AI_GRADING_PREFIX_CACHE_REDIS_URL: redis://redis:6379
      AI_GRADING_PYTHON: python3
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      LOCAL_STORAGE_ROOT: uploads
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-ai-homework-files}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_FORCE_PATH_STYLE: "true"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    volumes:
      - ./server/uploads:/app/uploads

  assistant_service:
    build:
      context: ./assistant_service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ASSISTANT_PORT: 4100
      REDIS_URL: redis://redis:6379
      ASSISTANT_ASSET_BASE: http://web
      ASSISTANT_USE_MCP: ${ASSISTANT_USE_MCP:-true}
      ASSISTANT_MCP_API_BASE: ${ASSISTANT_MCP_API_BASE:-http://server_api:3000/api/v1}
      ASSISTANT_MCP_API_TIMEOUT_MS: ${ASSISTANT_MCP_API_TIMEOUT_MS:-12000}
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/metrics').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_SCHOOL_NAME: ${VITE_SCHOOL_NAME:-}
        VITE_SCHOOLS: ${VITE_SCHOOLS:-}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_HOSTS: ${SITE_HOSTS:-:80}
    depends_on:
      server_api:
        condition: service_healthy
      server_auth:
        condition: service_healthy
      assistant_service:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
